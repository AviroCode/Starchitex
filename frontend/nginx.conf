server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Reverse-proxy API calls to the backend service within the Compose
    # network — this is what actually connects frontend and backend in
    # Docker, mirroring what vite.config.js's dev-server proxy does locally.
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Hashed asset filenames (Vite content-hashes them) are safe to cache
    # forever — a new build always gets a new filename.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # index.html itself must never be cached — it's what points at the
    # current asset hashes. Without this, a browser tab left open across a
    # rebuild can keep serving a stale build indefinitely.
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }
}
