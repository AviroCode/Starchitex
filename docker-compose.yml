version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: starchitex-postgres
    environment:
      POSTGRES_DB: starchitex
      POSTGRES_USER: starchitex_user
      POSTGRES_PASSWORD: local_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: starchitex-backend
    ports:
      - "8080:8080"
    environment:
      # These variables override your application.properties variables for local development!
      - DB_URL=jdbc:postgresql://db:5432/starchitex
      - DB_USERNAME=starchitex_user
      - DB_PASSWORD=local_password
    depends_on:
      - db

volumes:
  # This makes your database data persist even if the container stops!
  postgres-data:
