services:
  db:
    image: postgres:15-alpine
    container_name: starchitex-postgres
    environment:
      POSTGRES_DB: starchitex
      POSTGRES_USER: starchitex_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Self-initializes a fresh container: schema first, seed data second
      # (docker-entrypoint-initdb.d runs *.sql in alphabetical order, and only
      # on an empty data directory).
      - ./backend/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./database/seed/seed_data.sql:/docker-entrypoint-initdb.d/02_seed_data.sql:ro
      # Rich demo/testing dataset (extra branch, rooms, staff, guests, live
      # reservations to exercise triggers) — local Docker only, see
      # database/seed/demo_data.sql's header. A real deploy applies
      # schema.sql + seed_data.sql by hand and never touches this file.
      - ./database/seed/demo_data.sql:/docker-entrypoint-initdb.d/03_demo_data.sql:ro

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: starchitex-backend
    ports:
      - "8080:8080"
    environment:
      # These variables override application.properties for local development.
      - DB_URL=jdbc:postgresql://db:5432/starchitex
      - DB_USERNAME=starchitex_user
      - DB_PASSWORD=${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      - JWT_SECRET=${JWT_SECRET:?set JWT_SECRET in .env}
      # Email domain staff must belong to for the simulated Google sign-in
      # flow (AuthService.googleLogin) — optional, defaults to starchitex.com.
      - STAFF_GOOGLE_DOMAIN=${STAFF_GOOGLE_DOMAIN:-starchitex.com}
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: starchitex-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  # This makes your database data persist even if the container stops!
  postgres-data:
