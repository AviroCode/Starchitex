# Spring Boot Database Configuration
# No real credentials live here — set DB_URL/DB_USERNAME/DB_PASSWORD as
# environment variables (docker-compose.yml does this for local Docker; for
# Render, set them in the Render dashboard's environment tab). The defaults
# below only work against a local Postgres with matching credentials.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/starchitex}
spring.datasource.username=${DB_USERNAME:starchitex_user}
spring.datasource.password=${DB_PASSWORD:local_password}

# JWT signing key (Base64-encoded, 256+ bits). Set JWT_SECRET in the
# environment; if unset, JwtUtil falls back to an ephemeral generated key
# (fine for local `mvnw spring-boot:run`, not for anything shared).
app.jwt.secret=${JWT_SECRET:}

# Spring Data JDBC (Manual SQL) configuration
spring.jdbc.template.query-timeout=30s

# Disable schema initialization (schema is applied via docker-entrypoint-initdb.d
# locally, or by hand with `psql -f schema.sql` against a managed provider)
spring.sql.init.mode=never
